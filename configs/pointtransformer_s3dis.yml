model:
  name: PointTransformer
  batcher: ConcatBatcher
  ckpt_path: # path/to/your/checkpoint
  in_channels: 6
  blocks: [2, 3, 4, 6, 3]
  num_classes: 16
  voxel_size: 0.04
  max_voxels: 50000
  ignored_label_inds: []  # Made consistent with dataset
  augment:
    recenter:
      dim: [0,1,2]
    rotate:
      method: vertical
    scale:
      min_s: 0.95
      max_s: 1.05
    noise:
      noise_std: 0.005
    # ChromaticAutoContrast:
    #   randomize_blend_factor: True
    #   blend_factor: 0.2
    # ChromaticTranslation:
    #   trans_range_ratio: 0.05
    # ChromaticJitter:
    #   std: 0.01
    # HueSaturationTranslation:
    #   hue_max: 0.5
    #   saturation_max: 0.2

pipeline:
  name: SemanticSegmentation
  optimizer:
    lr: 0.00001 #0.003 #0.02
    momentum: 0.9
    weight_decay: 0.0001
  batch_size: 3
  learning_rate: 0.00001 #0.01
  main_log_dir: ./logs
  max_epoch: 250
  save_ckpt_freq: 1
  scheduler_gamma: 0.99
  test_batch_size: 1
  train_sum_dir: /home/jeremychia/Documents/Open3D-ML/train_log_ft185
  val_batch_size: 3
  pin_memory: False  # Added from KPConv config
  num_workers: 0     # Added from KPConv config
  summary:
    record_for: []
    max_pts:
    use_reference: false
    max_outputs: 1