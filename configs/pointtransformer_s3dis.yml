  test_result_folder: ./test
  use_cache: false

# Labels (training IDs → human-readable names)
# Must match LABEL_TO_CLASS in spatial_grid_splitting_s3dis.py
labels:
  0: Unlabelled
  1: Wall
  2: Staircase
  3: Fixed_Obstacles
  4: Temporary_Ramps
  5: Safety_Barriers_And_Signs
  6: Temporary_Utilities
  7: Scaffold_Structure
  8: Semi_Fixed_Obstacles
  9: Large_Materials
  10: Stored_Equipment
  11: Mobile_Machines_And_Vehicles
  12: Movable_Objects
  13: Containers_And_Pallets
  14: Small_Tools
  15: Portable_Objects

# Color map for visualization (same as KPConv)
